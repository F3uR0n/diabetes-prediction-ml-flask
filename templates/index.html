<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Risk Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <!-- FORM -->
    <div class="card form-card">
        <h2>🩺 Diabetes Risk Predictor</h2>
        <p class="subtitle">AI-powered health assessment</p>

        <form method="POST">
            <div class="grid">

                <div>
                    <label>Age</label>
                    <input type="number" name="age" required>
                </div>

                <div>
                    <label>BMI</label>
                    <input type="number" step="0.1" name="bmi" required>
                </div>

                <div>
                    <label>HbA1c (%)</label>
                    <input type="number" step="0.1" name="hba1c" required>
                </div>

                <div>
                    <label>Blood Glucose</label>
                    <input type="number" name="glucose" required>
                </div>

                <div>
                    <label>Hypertension</label>
                    <select name="hypertension">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label>Heart Disease</label>
                    <select name="heart_disease">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label>Gender</label>
                    <select name="gender">
                        {% for option in gender_options %}
                        <option value="{{ option }}">{{ option }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label>Smoking History</label>
                    <select name="smoking">
                        {% for option in smoking_options %}
                        <option value="{{ option }}">{{ option }}</option>
                        {% endfor %}
                    </select>
                </div>

            </div>

            <button type="submit">Predict Risk</button>
        </form>
    </div>

    <!-- RESULT -->
    <div class="card result-card">
        <h2>📊 Prediction Result</h2>

        {% if prediction %}
            <div class="result {{ 'danger' if 'Diabetic' in prediction else 'safe' }}">
                {{ prediction }}
            </div>
        {% else %}
            <p class="muted">Submit data to see prediction</p>
        {% endif %}

        {% if probability is not none %}
            <p class="prob-text">
                Risk Probability: <strong>{{ probability }}%</strong>
            </p>

            <!-- SAFE DATA PASSING -->
            <canvas id="riskChart"
                data-risk="{{ probability }}">
            </canvas>
        {% endif %}
    </div>

</div>

<footer>
    <p>Built with ❤️ using Flask & Machine Learning</p>
</footer>

<!-- SAFE JS (NO JINJA LOGIC) -->
<script>
    const chartCanvas = document.getElementById("riskChart");

    if (chartCanvas) {
        const risk = Number(chartCanvas.dataset.risk);
        const safe = 100 - risk;

        new Chart(chartCanvas, {
            type: "doughnut",
            data: {
                labels: ["Risk", "Safe"],
                datasets: [{
                    data: [risk, safe],
                    backgroundColor: ["#e74c3c", "#2ecc71"],
                    borderWidth: 0
                }]
            },
            options: {
                cutout: "70%",
                plugins: {
                    legend: { display: false }
                }
            }
        });
    }
</script>

</body>
</html>
