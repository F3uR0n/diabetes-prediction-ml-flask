<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Diabetes Prediction System</h1>

<form method="POST">

    <label>Age (years)</label><br>
    <input type="number" name="age"
        min="1" max="120" step="1"
        placeholder="e.g. 45" required>
    <br><br>

    <label>BMI (kg/m²)</label><br>
    <input type="number" name="bmi"
        min="10" max="60" step="0.1"
        placeholder="e.g. 23.5" required>
    <br><br>

    <label>HbA1c Level (%)</label><br>
    <input type="number" name="hba1c"
        min="4.0" max="14.0" step="0.1"
        placeholder="e.g. 5.4" required>
    <br><br>

    <label>Blood Glucose Level (mg/dL)</label><br>
    <input type="number" name="glucose"
        min="50" max="400" step="1"
        placeholder="e.g. 95" required>
    <br><br>

    <label>Hypertension</label><br>
    <select name="hypertension" required>
        <option value="0" selected>No</option>
        <option value="1">Yes</option>
    </select>
    <br><br>

    <label>Heart Disease</label><br>
    <select name="heart_disease" required>
        <option value="0" selected>No</option>
        <option value="1">Yes</option>
    </select>
    <br><br>

    <label>Gender</label><br>
    <select name="gender" required>
        <option value="0" selected>Female</option>
        <option value="1">Male</option>
    </select>
    <br><br>

    <label>Smoking History</label><br>
    <select name="smoking" required>
        <option value="0" selected>Never</option>
        <option value="1">Former</option>
        <option value="2">Current</option>
    </select>
    <br><br>

    <button type="submit">Predict</button>

</form>

<hr>

{% if prediction %}
    <h2>Result: {{ prediction }}</h2>
{% endif %}

{% if probability is not none %}
    <p><strong>Diabetes Risk Probability:</strong> {{ probability }}%</p>
{% endif %}

</body>
</html>
